<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>DFA Vending Machine</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

    <main class="app">

        <!-- Background -->

        <img
            src="images/vending-ui.png"
            alt="Vending Machine"
            id="background">

        <!-- Interactive Layer -->

        <section id="controls">

            <button class="control-btn" id="btn5000"></button>
            <button class="control-btn" id="btn10000"></button>
            <button class="control-btn" id="btn20000"></button>
            <button class="control-btn" id="btnBuy"></button>
            <button class="control-btn" id="btnStop"></button>
            <button class="control-btn" id="btnReset"></button>

        </section>

        <!-- DFA Graph -->

        <section id="graph">

        </section>

        <!-- Output -->

        <section id="output">

        </section>

    </main>

    <script src="js/main.js"></script>

</body>

</html>
